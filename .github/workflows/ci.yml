name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crispr_app/requirements.txt pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

  screenshot:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crispr_app/requirements.txt playwright
          python -m playwright install --with-deps chromium

      - name: Launch app and capture UI screenshot
        run: |
          mkdir -p docs
          (cd crispr_app && uvicorn main:app --port 8000 &)
          python - <<'PY'
          import time, sys
          from playwright.sync_api import sync_playwright
          # wait for server
          import urllib.request
          for _ in range(40):
              try:
                  urllib.request.urlopen("http://127.0.0.1:8000/health"); break
              except Exception:
                  time.sleep(0.5)
          with sync_playwright() as p:
              b = p.chromium.launch()
              pg = b.new_page(viewport={"width": 1280, "height": 1600})
              pg.goto("http://127.0.0.1:8000")
              pg.click("#exampleBtn")
              pg.click("#designBtn")
              pg.wait_for_selector("#guidesTable thead", timeout=15000)
              pg.wait_for_timeout(500)
              pg.screenshot(path="docs/ui.png", full_page=True)
              b.close()
          print("screenshot written to docs/ui.png")
          PY

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshot
          path: docs/ui.png

      - name: Commit screenshot + refresh README image to main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Cache-bust the README image with the screenshot's content hash so
          # GitHub always shows the latest UI (it caches images by URL).
          HASH=$(md5sum docs/ui.png | cut -c1-8)
          sed -i -E "s#(\!\[CRISPR Precision Studio UI\]\(docs/ui\.png)(\?v=[0-9a-f]+)?\)#\1?v=${HASH})#" README.md
          git add docs/ui.png README.md
          if git diff --cached --quiet; then
            echo "UI unchanged; nothing to commit."
          else
            git commit -m "docs: update UI screenshot + README image [skip ci]"
            git push
          fi
